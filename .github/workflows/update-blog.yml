name: 블로그 + 뉴스레터 자동 업데이트

on:
  schedule:
    # 매주 월요일 오후 12시 (KST) = 월요일 03:00 (UTC)
    - cron: '0 3 * * 1'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 레포 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 블로그 + 뉴스레터 업데이트
        run: node scripts/update-blog.mjs

      - name: 변경사항 커밋 & 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "chore: 블로그 + 뉴스레터 자동 업데이트"
          git push
